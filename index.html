<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mishelita ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fff7f8;
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --detail: #ffc2d1;
            --text: #4a2c2a;
            --white-glass: rgba(255, 255, 255, 0.75);
            --shadow-sm: 0 4px 12px rgba(255, 77, 109, 0.1);
            --shadow-md: 0 8px 30px rgba(255, 77, 109, 0.15);
            --shadow-lg: 0 16px 40px rgba(74, 44, 42, 0.12);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text); }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: linear-gradient(135deg, #fff7f8 0%, #fff0f2 50%, #ffe5eb 100%); }
        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; position: relative; }
        .btn-premium { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 0.9rem 2.2rem; border-radius: 50px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
        .glass-panel { background: var(--white-glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: var(--shadow-md); border-radius: 24px; padding: 3rem; }
        
        /* Estilos específicos de las secciones */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 10000; display: flex; justify-content: center; align-items: center; transition: opacity 1s ease; }
        .envelope-wrapper { position: relative; cursor: pointer; width: 320px; height: 220px; margin-bottom: 30px; }
        .envelope { position: relative; width: 100%; height: 100%; background-color: var(--secondary); border-radius: 0 0 10px 10px; }
        .letter { position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; background: white; border-radius: 8px; z-index: 2; padding: 20px; text-align: center; }
        .reveal { opacity: 0; transform: translateY(40px); transition: opacity 1.2s, transform 1.2s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .counter-section { text-align: center; }
        .counter-container { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin-top: 2rem; }
        .counter-box { min-width: 120px; padding: 2rem 1rem; border-radius: 20px; background: white; border: 1px solid var(--detail); }
        .counter-number { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--primary); line-height: 1; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; margin-top: 3rem; }
        .polaroid { background-color: white; padding: 1.2rem; box-shadow: var(--shadow-md); border-radius: 4px; }
        .polaroid-img-wrapper { width: 100%; aspect-ratio: 1; overflow: hidden; }
        .polaroid-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
        .music-player { position: fixed; bottom: 30px; right: 30px; z-index: 9999; padding: 10px 16px; border-radius: 50px; background: var(--white-glass); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="bg-animated"></div>

    <!-- BIENVENIDA -->
    <div id="welcome-screen">
        <div class="welcome-container">
            <div class="envelope-wrapper" id="envelope-wrapper">
                <div class="envelope"><div class="letter"><p>Para la niña más bonita ❤️</p></div></div>
            </div>
            <button class="btn-premium" id="btn-open-site">Abrir con Amor</button>
        </div>
    </div>

    <!-- HERO -->
    <header class="container">
        <div class="glass-panel reveal">
            <h1>Mishelita</h1>
            <p>Eres la página más bonita que el destino escribió en mi vida.</p>
        </div>
    </header>

    <!-- CONTADOR -->
    <section class="container reveal" id="contador">
        <div class="counter-section glass-panel">
            <h2>El tiempo que llevamos amándonos</h2>
            <!-- CORRECCIÓN: Fecha puesta tal cual la pediste -->
            <p style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem; margin: 2rem 0; opacity: 0.8;">
                Desde el 04 de Enero de 2026
            </p>

            <div class="counter-container">
                <div class="counter-box"><span class="counter-number" id="days">00</span><p>Días</p></div>
                <div class="counter-box"><span class="counter-number" id="hours">00</span><p>Horas</p></div>
                <div class="counter-box"><span class="counter-number" id="minutes">00</span><p>Minutos</p></div>
                <div class="counter-box"><span class="counter-number" id="seconds">00</span><p>Segundos</p></div>
            </div>
        </div>
    </section>

    <!-- GALERÍA -->
    <section class="container reveal">
        <div class="gallery-grid">
            <div class="polaroid"><div class="polaroid-img-wrapper"><img src="foto1.jpg" alt="Foto"></div></div>
            <div class="polaroid"><div class="polaroid-img-wrapper"><img src="foto2.jpg" alt="Foto"></div></div>
            <div class="polaroid"><div class="polaroid-img-wrapper"><img src="foto3.jpg" alt="Foto"></div></div>
        </div>
    </section>

    <!-- MÚSICA -->
    <div class="music-player">
        <span>Nuestra Música 🎵</span>
        <button id="music-toggle">▶️</button>
        <audio id="bg-audio" src="musica.mp3" loop></audio>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="" style="max-width: 90%; max-height: 80%;">
    </div>

    <script>
        // Lógica: 4 de Enero de 2026
        const fechaInicio = new Date(2026, 0, 4, 13, 30, 0);

        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;
            document.getElementById('days').innerText = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('minutes').innerText = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('seconds').innerText = Math.floor((diferencia % (1000 * 60)) / 1000);
        }
        setInterval(actualizarContador, 1000);

        document.getElementById('envelope-wrapper').addEventListener('click', () => {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 1000);
        });

        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active');
            });
        });
    </script>
</body>
</html>
