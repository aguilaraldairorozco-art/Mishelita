<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale= 1.0 ">
    <!-- Aquí cambiamos el título de la pestaña -->
    <title>Mishelita ❤️</title>
    <!-- Fuentes Premium -->
    <link rel="preconnect" href=" https://fonts.googleapis.com ">
    <link rel="preconnect" href=" https://fonts.gstatic.com " crossorigin>
    <link href=" https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600;700&display=swap " rel="stylesheet">
   
    <style>
        /* ==========================================
           VARIABLES Y CONFIGURACIÓN GLOBAL
           =========================================== */
        :root {
            --bg-color: #fff7f8;
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --detail: #ffc2d1;
            --text: #4a2c2a;
            --white-glass: rgba( 255 , 255 , 255 , 0.75 );
            --shadow-sm: 0 4 px 12px rgba( 255 , 77, 109 , 0.1 );
            --shadow-md: 0 8 px 30px rgba( 255 , 77, 109 , 0.15 );
            --shadow-lg: 0 16 px 40px rgba(74, 44, 42, 0.12 );
            --transition: all 0.4 s cubic-bezier( 0.16 , 1, 0.3 , 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6 ;
        }

        h1, h2, h3, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Degradado animado de fondo suave */
        .bg-animated {
            posición: fija;
            superior: 0;
            left: 0;
            width: 100 %;
            height: 100 %;
            z-index: -10;
            background: linear-gradient( 135 deg, #fff7f 8 0 %, #fff0f 2 50 %, #ffe5eb 100 %);
            background-size: 400 % 400 %;
            animation: gradientMove 20s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100 % 50%; }
            100 % { background-position: 0% 50%; }
        }

        /* Contenedores y Estilos de Grid */
        .container {
            max-width: 1200 px;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
        }

        /* Botones Premium */
        .btn-premium {
            background: linear-gradient( 135 deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.9 rem 2.2 rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600 ;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            outline: none;
        }

        .btn-premium:hover {
            transform: translateY(-4px) scale( 1.02 );
            box-shadow: 0 12 px 24px rgba( 255 , 77, 109 , 0.35 );
        }

        /* Estilo Glassmorphism General */
        .glass-panel {
            background: var(--white-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba( 255 , 255 , 255 , 0.6 );
            box-shadow: var(--shadow-md);
            border-radius: 24px;
        }

        /* ===========================================
           PANTALLA DE BIENVENIDA (SOBRE)
           =========================================== */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100 vw;
            height: 100 vh;
            background-color: var(--bg-color);
            z-index: 10000 ;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            perspective: 1000 px;
            ancho: 320 px;
            alto: 220 px;
            margen inferior: 30px;
        }

        .envelope {
            posición: relativa;
            ancho: 100 %;
            alto: 100 %;
            color de fondo: var(--secondary);
            radio de borde: 0 0 10 px 10px;
            sombra de caja: var(--shadow-lg);
            transición: var(--transition);
        }

        .envelope::before {
            contenido: "";
            posición: absoluta;
            arriba: 0;
            izquierda: 0;
            borde izquierdo: 160 px sólido transparente;
            borde derecho: 160 px sólido transparente;
            borde superior: 110 px sólido var(--detail);
            origen de transformación: arriba;
            transición: transformación 0.6 s ease 0.2 s, z-index 0.2 s ease 0.4 s;
            z-index: 4;
        }

        .envelope-body {
            posición: absoluta;
            inferior: 0;
            ancho: 0;
            alto: 0;
            borde izquierdo: 160 px sólido var(--secondary);
            borde derecho: 160 px sólido var(--secondary);
            borde inferior: 110 px sólido #ff5d8f;
            radio del borde:0 0 10 px 10px;
            z-index: 3;
        }

        .letter {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: white;
            border-radius: 8px;
            z-index: 2;
            transition: transform 0.6 s ease;
            padding: 20px;
            text-align: center;
            box-shadow: 0 -5 px 15px rgba(0,0,0, 0.05 );
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .letter p {
            font-family: 'Playfair Display', serif;
            font-size: 1.1 rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        . envelope-wrapper.open .envelope::before {
            transform: rotateX( 180 deg);
            z-index: 1;
        }

        . envelope-wrapper.open .letter {
            transform: translateY(- 110 px);
            z-index: 5;
        }

        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* ===========================================
           SISTEMA DE ANIMACIÓN AL SCROLL
           ========================================== */
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale( 0.97 );
            transición: opacidad 1.2 s cubic-bezier( 0.16 , 1, 0.3 , 1), transformación 1.2 s cubic-bezier( 0.16 , 1, 0.3 , 1);
        }

        . reveal.active {
            opacidad: 1;
            transformación: translateY(0) scale(1);
        }

        /* ===========================================
           SECCIÓN HERO
           ========================================== */
        encabezado {
            altura mínima: 100 vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .hero-card {
            padding: 4rem 3rem;
            max-width: 750 px;
            width: 100 %;
        }

        .hero-card h1 {
            font-size: 4.5 rem;
            color: var(--primary);
            margin-bottom: 1.5 rem;
            line-height: 1.2 ;
            animation: bounceSoft 4s ease-in-out infinite;
        }

        .hero-card p {
            font-size: 1.35 rem;
            margin-bottom: 2.5 rem;
            font-weight: 300 ;
        }

        @keyframes bounceSoft {
            0%, 100 % { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* ==========================================
           MENSAJE PRINCIPAL
           =========================================== */
        .main-message {
            background: linear-gradient( 135 deg, rgba( 255 , 77, 109 , 0.08 ) 0%, rgba( 255 , 133 , 161 , 0.05 ) 100 %);
            border: 1px solid rgba( 255 , 77, 109 , 0.15 );
            padding: 5rem 3rem;
            text-align: center;
            border-radius: 35px;
            margin: 2rem 0;
        }

        .main-message p {
            font-family: 'Playfair Display', serif;
            font-size: 2.1 rem;
            line-height: 1.7 ;
            font-style: italic;
            color: var(--text);
            max-width: 900 px;
            margin: 0 auto;
        }

        /* ===========================================
           CONTADOR
           ========================================== */
        .counter-section {
            text-align: center;
        }

        .counter-section h2 {
            font-size: 2.5 rem;
            color: var(--primary);
            margin-bottom: 3rem;
        }

        .counter-container {
            display: flex;
            justify-content: center;
            gap: 1.5 rem;
            flex-wrap: wrap;
        }

        .counter-box {
            min-width: 120 px;
            padding: 2rem 1rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 0.5 rem;
        }

        .counter-number {
            font-family: 'Playfair Display', serif;
            font-size: 3.2 rem;
            font-weight: 700 ;
            color: var(--primary);
            line-height: 1;
        }

        .counter-label {
            font-size: 0.85 rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600 ;
            opacity: 0.8 ;
        }

        /* ===========================================
           GALERÍA POLAROID (FOTOS)
           =========================================== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax( 280 px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
        }

        .polaroid {
            background-color: white;
            padding: 1.2 rem;
            padding-bottom: 2.5 rem;
            box-shadow: var(--shadow-md);
            border-radius: 4px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        .polaroid:nth-child(1) { transform: rotate(-2deg); }
        .polaroid:nth-child(2) { transform: rotate( 1.5 deg); }
        .polaroid:nth-child(3) { transform: rotate(-1deg); }

        .polaroid:hover {
            transform: scale( 1.05 ) rotate(0deg) translateY(-10px);
            box-shadow: var(--shadow-lg);
            z-index: 10;
        }

        .polaroid-img-wrapper {
            width: 100 %;
            aspect-ratio: 1;
            overflow: hidden;
            background-color: #eee;
            margin-bottom: 1.5 rem;
            border: 1px solid rgba(0,0,0, 0.05 );
        }

        .polaroid-img-wrapper img {
            width: 100 %;
            height: 100 %;
            object-fit: cover;
            transition: transform 0.6 s ease;
        }

        .polaroid:hover .polaroid-img-wrapper img {
            transform: scale( 1.1 );
        }

        .polaroid-caption {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-align: center;
            font-size: 1.15 rem;
            color: var(--text);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100 %;
            height: 100 %;
            background-color: rgba(74, 44, 42, 0.95 );
            backdrop-filter: blur(8px);
            z-index: 20000 ;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4 s ease;
        }

        . lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80%;
            border-radius: 12px;
            box-shadow: 0 10 px 40px rgba(0,0,0, 0.5 );
            transform: scale( 0.9 );
            transition: transform 0.4 s ease;
        }

        . lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            user-select: none;
        }

        /* ===========================================
           TARJETAS FLIP (RAZONES POR LAS QUE TE AMO)
           =========================================== */
        .reasons-title {
            text-align: center;
            font-size: 2.5 rem;
            color: var(--primary);
            margin-bottom: 3rem;
        }

        .reasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax( 240 px, 1fr));
            gap: 2rem;
        }

        .card-container {
            perspective: 1000 px;
            height: 250 px;
        }

        .card-inner {
            position: relative;
            width: 100 %;
            height: 100 %;
            text-align: center;
            transition: transform 0.8 s cubic-bezier( 0.175 , 0.885 , 0.32 , 1.275 );
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-container:hover .card-inner {
            transform: rotateY( 180 deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100 %;
            height: 100 %;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-front {
            background: var(--white-glass);
            border: 1px solid rgba( 255 , 77, 109 , 0.2 );
            color: var(--primary);
        }

        .card-front span {
            font-size: 3.5 rem;
            margin-bottom: 0.5rem;
        }

        .card-front h3 {
            font-size: 1.3 rem;
            font-weight: 600 ;
        }

        .card-back {
            background: linear-gradient( 135 deg, var(--primary), var(--secondary));
            color: white;
            transform: rotateY( 180 deg);
        }

        .card-back p {
            font-size: 1.05 rem;
            font-weight: 500 ;
            line-height: 1.5 ;
        }

        /* =================================================
           SECCIÓN DE NOTAS INTERACTIVAS
           =================================================== */
        .notes-section {
            max-width: 800 píxeles;
            margen: 0 automático;
        }

        .sección-notas h2 {
            alineación de texto: centro;
            tamaño de fuente: 2,5 rem;
            color: var(--primario);
            margen inferior: 2rem;
        }

        .note-creator {
            relleno: 2rem;
            margen inferior: 3rem;
        }

        .note-creator textarea {
            ancho: 100 %;
            altura: 120 píxeles;
            background: rgba( 255 , 255 , 255 , 0.8 );
            border: 1px solid var(--detail);
            border-radius: 12px;
            padding: 1rem;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text);
            resize: none;
            outline: none;
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax( 220 px, 1fr));
            gap: 1.5 rem;
        }

        .note-card {
            background: #fff;
            border-left: 5px solid var(--primary);
            padding: 1.5 rem;
            border-radius: 8px 16px 16px 8px;
            box-shadow: var(--shadow-sm);
            posición: relativa;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180 px;
            transition: var(--transition);
        }

        .note-content {
            font-size: 0.95 rem;
            margin-bottom: 1.5 rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

            display: flex;
